name: JavaScript CI with CodeQL and SonarQube

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

# 🔍 CodeQL SAST Scan
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    # ✅ Avoid permission issue on fork PRs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 🧹 Free disk space
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript
        enable-incremental: false   # ✅ Fix disk issue

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v3

# ⚙️ JavaScript Build & Test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: codeql

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm install

   
    - name: Run Tests
      run: npm test || true

# 📊 SonarQube Code Quality Analysis
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SonarQube to detect new code correctly

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Tests with coverage
      run: npm run cucumber || true

    - name: SonarQube Scan
      id: sonar-scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 📈 Code Quality Metrics & Tech Debt Report
    - name: SonarQube Quality Metrics Report
      run: |
        PROJECT_KEY="ALMMicrosoft_JavaScriptCopilot2"
        METRICS="bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,sqale_index,sqale_debt_ratio,reliability_rating,security_rating,sqale_rating,new_bugs,new_vulnerabilities,new_code_smells"
        echo "============================================"
        echo "  SonarQube Code Quality & Tech Debt Report"
        echo "============================================"
        curl -sf -u "${SONAR_TOKEN}:" \
          "${SONAR_HOST_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRICS}" \
        | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        measures = {m['metric']: m.get('value','N/A') for m in data['component']['measures']}
        labels = {
          'ncloc':                   'Lines of Code',
          'bugs':                    'Bugs',
          'vulnerabilities':         'Vulnerabilities',
          'code_smells':             'Code Smells',
          'coverage':                'Test Coverage (%)',
          'duplicated_lines_density':'Duplicated Lines (%)',
          'sqale_index':             'Technical Debt (mins)',
          'sqale_debt_ratio':        'Technical Debt Ratio (%)',
          'reliability_rating':      'Reliability Rating (1=A)',
          'security_rating':         'Security Rating (1=A)',
          'sqale_rating':            'Maintainability Rating (1=A)',
          'new_bugs':                'New Bugs',
          'new_vulnerabilities':     'New Vulnerabilities',
          'new_code_smells':         'New Code Smells',
        }
        for key, label in labels.items():
            print(f'  {label:<35} {measures.get(key, \"N/A\")}')
        print('============================================')
        "
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 🚦 Quality Gate: fails the job if the Quality Gate is not passed
    - name: SonarQube Quality Gate Check
      uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
